# 在 sync-indicator/ 目录下执行：docker compose -f docker/docker-compose.yml up -d
# 注意：需提前在根目录配置好 .env（DATABASE_URL、API_PORT）
x-env: &env
  env_file:
    - ../.env

services:
  # 获取合约信息
  fetch-instruments:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-fetch-instruments
    command: ["node", "packages/sync/dist/scripts/fetch-instruments.js"]
    <<: *env
    restart: "no"

  # 实时 K 线同步：先拉历史再常驻 WebSocket 写库
  sync-ohlcv:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-sync-ohlcv
    command: ["sh", "-c", "node packages/sync/dist/scripts/fetch-okx-ohlcv.js && exec node packages/sync/dist/scripts/sync-realtime-ohlcv.js"]
    <<: *env
    restart: unless-stopped

  # 实时成交明细同步
  sync-realtime-trades:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-sync-realtime-trades
    command: ["node", "packages/sync/dist/scripts/sync-realtime-trades.js"]
    <<: *env
    restart: unless-stopped

  # 实时 BBO 买卖一档同步
  sync-realtime-bbo:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-sync-realtime-bbo
    command: ["node", "packages/sync/dist/scripts/sync-realtime-bbo.js"]
    <<: *env
    restart: unless-stopped

  # 实时订单簿 20 档同步
  sync-realtime-orderbook:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-sync-realtime-orderbook
    command: ["node", "packages/sync/dist/scripts/sync-realtime-orderbook.js"]
    <<: *env
    restart: unless-stopped

  # 初始化数据库表
  init-db:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-init-db
    command: ["node", "packages/sync/dist/scripts/init-db.js"]
    <<: *env
    restart: "no"

  # Fastify HTTP API
  indicator-api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api
    container_name: sync-indicator-api
    command: ["node", "packages/api/dist/index.js"]
    <<: *env
    ports:
      - "3211:3211"
    restart: unless-stopped
