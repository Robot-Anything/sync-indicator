# 在 sync-indicator/ 目录下执行：docker compose up -d
# 注意：需提前配置好外部 PostgreSQL 数据库
services:
  # 获取合约信息
  fetch-instruments:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-fetch-instruments
    command: ["node", "dist/scripts/fetch-instruments.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"

  # 实时 K 线同步：先拉历史再常驻 WebSocket 写库
  sync-ohlcv:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-sync-ohlcv
    command: ["sh", "-c", "node dist/scripts/fetch-okx-ohlcv.js && exec node dist/scripts/sync-realtime-ohlcv.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped

  # 实时成交明细同步
  sync-realtime-trades:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-sync-realtime-trades
    command: ["node", "dist/scripts/sync-realtime-trades.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped

  # 实时 BBO 买卖一档同步
  sync-realtime-bbo:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-sync-realtime-bbo
    command: ["node", "dist/scripts/sync-realtime-bbo.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped

  # 实时订单簿 20 档同步
  sync-realtime-orderbook:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-sync-realtime-orderbook
    command: ["node", "dist/scripts/sync-realtime-orderbook.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped

  # 初始化数据库表
  init-db:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sync
    container_name: sync-indicator-init-db
    command: ["node", "dist/scripts/init-db.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"

  # Fastify HTTP API
  indicator-api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api
    container_name: sync-indicator-api
    command: ["node", "dist/index.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: ${API_PORT:-3001}
    ports:
      - "${API_PORT:-3001}:3001"
    restart: unless-stopped
